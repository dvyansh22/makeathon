<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Command Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- MAP -->
    <div class="map-section">
        <div class="panel-title">TACTICAL MAP</div>
        <img src="assets/terrain.png" class="map-img">
        <div id="node-overlay" class="node-overlay"></div>
    </div>

    <!-- LOGS -->
    <div class="logs-section">
        <h3>SECURE NETWORK</h3>
        <div id="logs"></div>
    </div>

    <!-- THREATS -->
    <div class="threat-section">
        <h3>THREAT DETECT</h3>
        <div id="threats"></div>
    </div>

    <!-- STATUS -->
    <div class="status-section">

        <!-- HEADER -->
        <div class="status-header">
            <h3>OP-AREA STATUS</h3>
            <div class="live-indicator">● LIVE</div>
        </div>

        <!-- BACKEND STATUS (from main) -->
        <div id="backend-status" class="status-pill">Waiting for backend...</div>
        <div id="node-count" class="status-meta">0 active units</div>

        <!-- TIME BOX -->
        <div class="time-box">
            <div class="label">LOCAL TIME</div>
            <div id="time"></div>
        </div>

        <!-- INFO SECTION -->
        <div class="status-info">

            <!-- DATE -->
            <div class="info-block">
                <div class="label">DATE</div>
                <div id="date"></div>
            </div>

            <!-- WEATHER -->
            <div class="info-block">
                <div class="label">WEATHER</div>
                <div>CLEAR</div>
                <div class="sub">VIS: OPTIMAL</div>
            </div>

        </div>

    </div>

    <!-- VITALS -->
    <div class="vitals-section">
        <h3>UNIT VITALS</h3>
        <div id="vitals"></div>
    </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
