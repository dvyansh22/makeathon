<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Command Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- MAP -->
    <div class="map-section">
        <img src="assets/terrain.png" class="map-img">
    </div>

    <!-- LOGS -->
    <div class="logs-section">
        <h3>SECURE NETWORK</h3>
        <div id="logs"></div>
    </div>

    <!-- THREATS -->
    <div class="threat-section">
        <h3>THREAT DETECT</h3>
        <div id="threats"></div>
    </div>

    <!-- STATUS -->
    <div class="status-section">
        <h3>OP-AREA STATUS</h3>
        <div id="time"></div>
        <div id="date"></div>
    </div>

    <!-- VITALS -->
    <div class="vitals-section">
        <h3>UNIT VITALS</h3>
        <div id="vitals"></div>
    </div>

</div>

<script type="module" src="app.js"></script>
</body>
</html>
